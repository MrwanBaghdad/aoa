name: Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"
  pull_request:
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"

jobs:
  test-formula:
    name: Install via Homebrew
    runs-on: macos-latest

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Create source tarball from current commit
        run: |
          git archive --format=tar.gz HEAD > /tmp/aoa-local.tar.gz
          echo "SHA=$(shasum -a 256 /tmp/aoa-local.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create local tap and install formula
        run: |
          # Homebrew requires formulas to live inside a tap
          brew tap-new local/aoa
          TAP_DIR="$(brew --repository)/Library/Taps/local/homebrew-aoa/Formula"

          # Patch URL + sha256 to point at the local tarball
          sed \
            -e "s|url \".*\"|url \"file:///tmp/aoa-local.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/aoa.rb > "$TAP_DIR/aoa.rb"

          echo "--- patched formula ---"
          head -12 "$TAP_DIR/aoa.rb"

          brew install --build-from-source local/aoa/aoa

      - name: Run brew test
        run: brew test local/aoa/aoa

      - name: Smoke test — help
        run: aoa --help

      - name: Smoke test — version commands exist
        run: |
          aoa health  || true   # exits 1 when deps missing in CI — that's fine
          aoa list
