name: Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"
  pull_request:
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"

jobs:
  test-formula:
    name: Install via Homebrew
    runs-on: macos-latest

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Create source tarball
        run: |
          git archive --format=tar.gz HEAD > /tmp/aoa-local.tar.gz
          echo "SHA=$(shasum -a 256 /tmp/aoa-local.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Create local tap and install
        run: |
          # Build a minimal tap directory without cloning from GitHub
          # (avoids auth issues with private repos and is faster).
          TAP_DIR="$(brew --repository)/Library/Taps/marwan/homebrew-aoa"
          mkdir -p "$TAP_DIR/Formula"
          git -C "$TAP_DIR" init -q
          git -C "$TAP_DIR" config user.email "ci@aoa"
          git -C "$TAP_DIR" config user.name "CI"

          # Patch the formula and write it into the tap
          sed \
            -e "s|version \".*\"|version \"0.0.0-ci\"|" \
            -e "s|url \".*\"|url \"file:///tmp/aoa-local.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/aoa.rb > "$TAP_DIR/Formula/aoa.rb"

          git -C "$TAP_DIR" add Formula/aoa.rb
          git -C "$TAP_DIR" commit -q -m "ci"

          brew install --build-from-source marwan/aoa/aoa

      - name: Run brew test
        run: brew test marwan/aoa/aoa --verbose

      - name: Smoke tests
        run: |
          aoa --help
          aoa health || true   # exits 1 when apple/container not installed — expected in CI
          aoa list
