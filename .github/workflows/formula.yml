name: Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"
  pull_request:
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"

jobs:
  test-formula:
    name: Install via Homebrew
    runs-on: macos-latest

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Create source tarball
        run: |
          git archive --format=tar.gz HEAD > /tmp/aoa-local.tar.gz
          echo "SHA=$(shasum -a 256 /tmp/aoa-local.tar.gz | awk '{print $1}')" >> "$GITHUB_ENV"

      - name: Tap repo and patch formula in tap directory
        run: |
          brew tap marwan/aoa https://github.com/MrwanBaghdad/aoa
          TAP_FORMULA="$(brew --repository)/Library/Taps/marwan/homebrew-aoa/Formula/aoa.rb"
          # Patch the formula in the tap to use the local tarball.
          # Must patch in the tap dir (not the workspace) since brew tap clones
          # from git and only sees committed files.
          sed -i.bak \
            -e "s|version \".*\"|version \"0.0.0-ci\"|" \
            -e "s|url \".*\"|url \"file:///tmp/aoa-local.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            "$TAP_FORMULA"
          brew install --build-from-source marwan/aoa/aoa

      - name: Run brew test
        run: brew test marwan/aoa/aoa --verbose

      - name: Smoke tests
        run: |
          aoa --help
          aoa health || true   # exits 1 when apple/container not installed — expected in CI
          aoa list
