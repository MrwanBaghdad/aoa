name: Formula

on:
  push:
    branches: [main]
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"
  pull_request:
    paths:
      - "Formula/aoa.rb"
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/formula.yml"

jobs:
  test-formula:
    name: Install via Homebrew
    runs-on: macos-latest

    env:
      HOMEBREW_NO_AUTO_UPDATE: 1
      HOMEBREW_NO_INSTALL_CLEANUP: 1

    steps:
      - uses: actions/checkout@v4

      - name: Update Homebrew
        run: brew update

      - name: Create source tarball and patch formula
        run: |
          git archive --format=tar.gz HEAD > /tmp/aoa-local.tar.gz
          SHA=$(shasum -a 256 /tmp/aoa-local.tar.gz | awk '{print $1}')
          # Patch in place: point at the local tarball and inject an explicit
          # version (Homebrew cannot infer one from a file:// URL)
          sed -i.bak \
            -e "s|version \".*\"|version \"0.0.0-ci\"|" \
            -e "s|url \".*\"|url \"file:///tmp/aoa-local.tar.gz\"|" \
            -e "s|sha256 \".*\"|sha256 \"$SHA\"|" \
            Formula/aoa.rb

      - name: Tap the local repo and install
        run: |
          brew tap marwan/aoa "$GITHUB_WORKSPACE"
          brew install --build-from-source marwan/aoa/aoa

      - name: Run brew test
        run: brew test marwan/aoa/aoa

      - name: Smoke tests
        run: |
          aoa --help
          aoa health || true   # exits 1 when apple/container not installed — expected in CI
          aoa list
