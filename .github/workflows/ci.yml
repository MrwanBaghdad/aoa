name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # ── Go lint ────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: v2.11.4

      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  # ── Go unit tests ──────────────────────────────────────────────────────────
  test:
    name: Unit tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  # ── Python integration tests (CLI only — no container runtime needed) ──────
  integration:
    name: Integration tests (CLI)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build aoa binary
        run: go build -o aoa .

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/support/requirements.txt

      - name: Install test dependencies
        run: pip install -r tests/support/requirements.txt

      - name: Run CLI integration tests
        run: AOA_BINARY=$PWD/aoa pytest tests/ -v -m "cli or not requires_container" --tb=short
