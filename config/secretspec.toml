# secretspec.toml — example SecretSpec configuration for aoa projects
# Place in your project root. aoa auto-detects this file.
# See: https://github.com/cachix/secretspec

[project]
name = "my-agent-project"

# Default profile — used when no profile is explicitly selected
[profiles.default]

[profiles.default.ANTHROPIC_API_KEY]
description = "Claude API key for AI coding agent"
required = true

[profiles.default.GITHUB_TOKEN]
description = "GitHub token for PR creation and repo access"
required = false

[profiles.default.DATABASE_URL]
description = "Dev database connection string"
required = false
# as_path = true means aoa writes the value to a tmpfile and injects the path
# Useful for secrets that need to be read from a file (SSL certs, etc.)
# as_path = true


# Development profile — relaxed requirements, local defaults
[profiles.development]

[profiles.development.ANTHROPIC_API_KEY]
description = "Claude API key"
required = true

[profiles.development.DATABASE_URL]
description = "Local dev database"
required = false
default = "postgres://localhost:5432/dev"
